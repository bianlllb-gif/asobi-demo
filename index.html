<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=720"><title>调教游戏</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei",sans-serif;background:#0a0a0a;overflow:hidden;user-select:none;display:flex;justify-content:center;align-items:center;height:100vh}
#game{width:720px;height:960px;position:relative;overflow:hidden;background:#1a1a2e}
#bg{position:absolute;inset:0;z-index:0;width:100%;height:100%;object-fit:cover}
#bg.fb{background:#1a1a2e}
#dlg{position:absolute;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);border-radius:12px 12px 0 0;padding:12px 16px 36px;z-index:10;color:#ddd;font-size:15px;line-height:1.5;cursor:pointer;min-height:80px}
#dn{position:absolute;top:-22px;left:12px;background:rgba(0,0,0,.9);color:#ff6b9d;padding:2px 10px;border-radius:5px 5px 0 0;font-size:12px;font-weight:bold;display:none}
#dh{position:absolute;bottom:10px;right:14px;font-size:10px;color:rgba(255,255,255,.3);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
#ch{position:absolute;left:50%;bottom:140px;transform:translateX(-50%);z-index:15;display:flex;flex-direction:column;gap:6px;min-width:300px}
.cb{background:rgba(20,20,40,.94);color:#ddd;border:1px solid rgba(255,255,255,.15);padding:10px 18px;border-radius:8px;cursor:pointer;font-size:14px;text-align:center;font-family:inherit}
.cb:hover{background:rgba(60,60,100,.94);border-color:#ff6b9d;color:#fff}
#st{position:absolute;top:8px;left:8px;z-index:20;background:rgba(0,0,0,.7);border-radius:8px;padding:10px 12px;color:#ccc;font-size:11px;line-height:1.7;min-width:140px}
.sl{color:#999}.sv{color:#ff6b9d;font-weight:bold}.sb{height:3px;background:rgba(255,255,255,.1);margin-top:2px;border-radius:2px;overflow:hidden}.sf{height:100%;border-radius:2px}
#bt{position:absolute;top:8px;right:8px;z-index:20;display:flex;gap:6px}
.ab{background:rgba(0,0,0,.55);color:#ccc;border:1px solid rgba(255,255,255,.12);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-family:inherit}.ab:hover{background:rgba(255,255,255,.15);color:#fff}
#to{position:absolute;top:80px;left:50%;transform:translateX(-50%);z-index:80;background:rgba(0,0,0,.85);color:#ff6b9d;padding:6px 16px;border-radius:16px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none}
#to.show{opacity:1}
.modal{position:absolute;inset:0;z-index:50;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center}
.mb{background:#1a1a2e;border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:20px;min-width:360px;max-width:560px;color:#ddd}
.mb h3{text-align:center;color:#ff6b9d;margin-bottom:12px}
.mr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.ma{background:rgba(255,255,255,.1);color:#ccc;border:1px solid rgba(255,255,255,.15);padding:4px 12px;border-radius:5px;cursor:pointer;font-size:12px;font-family:inherit}.ma:hover{background:rgba(255,255,255,.2);color:#fff}
.mp{background:rgba(255,107,157,.3);border-color:rgba(255,107,157,.4)}
#gb{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);z-index:25;display:none;max-width:680px}
#gb.on{display:flex;flex-direction:column;align-items:center;gap:6px}
</style></head><body>
<div id="game">
<img id="bg" src="" class="fb"><div id="dlg" onclick="G.adv()"><div id="dn"></div><div id="dt"></div><div id="dh">▼ 点击继续</div></div>
<div id="ch"></div><div id="st"></div><div id="bt"></div><div id="to"></div><div id="gb"></div></div>
<script src="js/imgpool.js"></script>
<script src="js/engine.js"></script>
<script src="js/game_edge.js"></script>
<script src="js/game_obey.js"></script>
<script src="js/game_scent.js"></script>
<script src="js/story.js"></script>
<script>G.st();</script>
</body></html>
